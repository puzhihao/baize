version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: baize-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-baize_password}
      MYSQL_DATABASE: ${DB_NAME:-baize}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-baize_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: baize-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  app:
    build:
      context: .
      dockerfile: Dockerfile.all-in-one
      args:
        VITE_API_URL: /api
    container_name: baize-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-baize_password}
      DB_NAME: ${DB_NAME:-baize}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      S3_BUCKET: baize-resumes
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      STORAGE_PROVIDER: s3
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      DEFAULT_AI_MODEL: ${DEFAULT_AI_MODEL:-minimax}
    ports:
      - "80:80"

volumes:
  mysql_data:
  minio_data:
